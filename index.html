<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>안경점 미스터리쇼퍼 FAQ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2330;
    --border: #2a3040;
    --accent: #4f8ef7;
    --accent2: #7dd3c0;
    --warn: #f7a84f;
    --text: #e8eaf0;
    --text-muted: #7a8099;
    --user-bg: #1a2540;
    --bot-bg: #161921;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
  }

  /* Header */
  .header {
    width: 100%;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .header-text p {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: #4ade80;
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 6px #4ade80aa;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Chat container */
  .chat-wrap {
    width: 100%;
    max-width: 680px;
    flex: 1;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 65px);
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Messages */
  .msg {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.25s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    margin-top: 2px;
  }

  .avatar.bot {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .avatar.user {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: 85%;
    padding: 13px 16px;
    border-radius: var(--radius);
    line-height: 1.65;
    font-size: 14px;
  }

  .msg.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid #2a3f6a;
    border-top-right-radius: 4px;
    color: var(--text);
  }

  .bubble strong { color: var(--accent2); font-weight: 600; }
  .bubble .warn { color: var(--warn); font-weight: 600; }
  .bubble .tag {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    margin-right: 4px;
  }

  .bubble ul { padding-left: 18px; margin-top: 6px; }
  .bubble ul li { margin-bottom: 5px; }
  .bubble p + p { margin-top: 8px; }
  .bubble .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 10px 0;
  }

  /* Quick reply chips */
  .chips-wrap {
    padding: 8px 16px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 13px;
    font-size: 12.5px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
  }

  .chip:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Input area */
  .input-area {
    padding: 12px 16px 20px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: flex-end;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
  }

  #userInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    resize: none;
    max-height: 100px;
    min-height: 22px;
    line-height: 1.5;
  }

  #userInput::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), #3a6fd8);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }

  .send-btn:hover { opacity: 0.9; transform: scale(1.04); }
  .send-btn:active { transform: scale(0.96); }

  .send-btn svg { width: 16px; height: 16px; fill: white; }

  /* Typing indicator */
  .typing-dots {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }

  .typing-dots span {
    width: 6px; height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: dot 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot {
    0%, 100% { opacity: 0.3; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  /* Notice banner */
  .notice-banner {
    background: linear-gradient(90deg, #1a2540, #192030);
    border: 1px solid #2a3f6a;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text-muted);
    margin: 0 16px 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .notice-banner .icon { font-size: 14px; flex-shrink: 0; }

  @media (max-width: 480px) {
    .bubble { font-size: 13px; }
    .chip { font-size: 12px; padding: 5px 11px; }
  }
</style>
</head>
<body>

<div class="header">

function matchFAQ(text) {
  const t = text.toLowerCase().replace(/\s/g, '');
  for (const [, faq] of Object.entries(FAQ)) {
    if (faq.keywords.some(k => t.includes(k.replace(/\s/g, '')))) {
      return faq.answer();
    }
  }
  return null;
}

function defaultReply(text) {
  return `말씀하신 내용에 해당하는 FAQ를 찾지 못했습니다.<br><br>
아래 빠른 질문 버튼을 이용하시거나, 더 구체적으로 질문해 주시면 도움드릴 수 있습니다.<br><br>
긴급 문의는 <strong>010-9588-8953</strong>으로 연락해 주세요. (평일 09:00~18:00)`;
}

let typingEl = null;

function appendMsg(html, role) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'bot' ? '🔍' : '👤';
  div.innerHTML = `
    <div class="avatar ${role}">${avatar}</div>
    <div class="bubble">${html}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function showTyping() {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingMsg';
  div.innerHTML = `
    <div class="avatar bot">🔍</div>
    <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

function handleSend() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  processMessage(text);
}

function sendChip(text) {
  processMessage(text);
}

function processMessage(text) {
  appendMsg(text, 'user');
  showTyping();
  setTimeout(() => {
    removeTyping();
    const matched = matchFAQ(text);
    appendMsg(matched || defaultReply(text), 'bot');
  }, 650);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// Welcome message

    appendMsg(`안녕하세요! 👋 <strong>안경점 미스터리쇼퍼 FAQ 챗봇</strong>입니다.<br><br>
조사 관련 궁금한 점을 질문하시거나, 아래 빠른 질문 버튼을 눌러주세요.<br><br>
<span class="warn">⚠️ 조사 관련 모든 문의는 반드시 저희를 통해서만 해주세요. 매장 문의 절대 금지!</span>`, 'bot');
  }, 300);
};
