const messagesEl = document.getElementById('messages');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');

const groups = {
  star: { el: document.getElementById('grpStar'), idxs: [] },
  info: { el: document.getElementById('grpInfo'), idxs: [] },
  etc:  { el: document.getElementById('grpEtc'),  idxs: [] },
  link: { el: document.getElementById('grpLink'), idxs: [] }
};

const groupMap = [
  'star','star','star',
  'info','info','info',
  'etc','etc','etc','etc',
  'link','link','link'
];

function getTime() {
  const now = new Date();
  return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}

function addMsg(html, type) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + (type === 'user' ? 'user' : 'bot');
  if (type === 'bot') {
    row.innerHTML = '<div class="msg-avatar-sm">Q</div><div><div class="msg-bubble bot">' + html + '</div><div class="msg-time">' + getTime() + '</div></div>';
  } else {
    row.innerHTML = '<div><div class="msg-bubble user">' + html + '</div><div class="msg-time" style="text-align:right">' + getTime() + '</div></div>';
  }
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderQuickBtns() {
  Object.values(groups).forEach(function(g) { g.el.innerHTML = ''; g.idxs = []; });
  faqs.forEach(function(faq, i) {
    const grpKey = groupMap[i] || 'etc';
    const g = groups[grpKey];
    g.idxs.push(i);
    const btn = document.createElement('button');
    btn.className = 'quick-btn' + (faq.star ? ' star' : '');
    btn.dataset.idx = i;
    btn.innerHTML = '<span class="btn-emoji">' + faq.emoji + '</span>' + faq.label;
    btn.addEventListener('click', function() {
      document.querySelectorAll('.quick-btn').forEach(function(b) {
        b.classList.toggle('active', parseInt(b.dataset.idx) === i);
      });
      addMsg(faq.q, 'user');
      setTimeout(function() { addMsg(faq.a, 'bot'); }, 300);
    });
    g.el.appendChild(btn);
  });
}

function handleSend() {
  const val = chatInput.value.trim();
  if (!val) return;
  addMsg(val, 'user');
  chatInput.value = '';
  const matched = faqs.find(function(f) { return f.label.includes(val) || f.q.includes(val); });
  setTimeout(function() {
    addMsg(matched
      ? matched.a
      : '죄송합니다, 해당 내용을 찾지 못했습니다.<br>아래 빠른 질문 버튼을 눌러 주시거나, <b>010-9588-8953</b>으로 문의해 주세요. (평일 09:00~18:00)',
      'bot'
    );
  }, 350);
}

sendBtn.addEventListener('click', handleSend);
chatInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleSend(); });

addMsg('안녕하세요! <b>안경점 방문조사 FAQ 챗봇</b>입니다.<br>아래 버튼을 눌러 궁금한 내용을 빠르게 확인하세요.', 'bot');
renderQuickBtns();
</script>
